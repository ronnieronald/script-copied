<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Generador de Devocionales</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family: Arial, sans-serif;
padding:20px;
background:#f0f4ff;
color:#333;
}

h1{
text-align:center;
color:#1e3a8a;
margin-bottom:20px;
}

label{
font-weight:bold;
}

select{
width:100%;
margin-bottom:15px;
padding:10px;
font-size:1rem;
border-radius:8px;
border:1px solid #ccc;
}

button{
cursor:pointer;
background:#1e3a8a;
color:#fff;
transition:0.3s;
font-weight:bold;
padding:10px;
border:none;
border-radius:8px;
width:100%;
margin-bottom:20px;
}

button:hover{
background:#3b82f6;
}

textarea{
width:100%;
min-height:150px;
resize:vertical;
font-family:monospace;
background:#fff;
border:1px solid #ccc;
border-radius:8px;
padding:12px;
padding-top:30px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

h3{
margin-top:30px;
color:#1e40af;
}

.contenedor{
position:relative;
}

.copyIcon{
position:absolute;
top:8px;
right:8px;
width:22px;
height:22px;
cursor:pointer;
opacity:0.7;
transition:0.2s;
}

.copyIcon:hover{
opacity:1;
transform:scale(1.1);
}

.copiado{
position:absolute;
top:8px;
right:40px;
font-size:12px;
color:green;
display:none;
font-weight:bold;
}

</style>
</head>

<body>

<h1>Generador de Devocionales</h1>

<label>Selecciona el día:</label>
<select id="selectorDia">
<option value="0">Lunes</option>
<option value="1">Martes</option>
<option value="2">Miércoles</option>
<option value="3">Jueves</option>
<option value="4">Viernes</option>
<option value="5">Sábado</option>
<option value="6">Domingo</option>
</select>

<button onclick="generarTodo()">⚡ Generar</button>

<h3>1️⃣ Devocional de Hoy</h3>

<div class="contenedor">
<img src="https://img.icons8.com/material-outlined/24/copy.png"
class="copyIcon"
onclick="copiarTexto('mensajeHoy',this)">
<div class="copiado">Copiado ✅</div>
<textarea id="mensajeHoy" readonly></textarea>
</div>

<h3>2️⃣ Recordatorio de Mañana</h3>

<div class="contenedor">
<img src="https://img.icons8.com/material-outlined/24/copy.png"
class="copyIcon"
onclick="copiarTexto('mensajeManana',this)">
<div class="copiado">Copiado ✅</div>
<textarea id="mensajeManana" readonly></textarea>
</div>

<button onclick="enviarWhatsapp()">📲 Enviar por WhatsApp</button>

<h3>3️⃣ Devocional Completo</h3>

<div class="contenedor">
<img src="https://img.icons8.com/material-outlined/24/copy.png"
class="copyIcon"
onclick="copiarTexto('mensajeCompleto',this)">
<div class="copiado">Copiado ✅</div>
<textarea id="mensajeCompleto" readonly></textarea>
</div>

<h3>4️⃣ Versículo Semanal</h3>

<div class="contenedor">
<img src="https://img.icons8.com/material-outlined/24/copy.png"
class="copyIcon"
onclick="copiarTexto('mensajeVersoSemanal',this)">
<div class="copiado">Copiado ✅</div>
<textarea id="mensajeVersoSemanal" readonly></textarea>
</div>

<h3>5️⃣ Resumen Semanal</h3>

<div class="contenedor">
<img src="https://img.icons8.com/material-outlined/24/copy.png"
class="copyIcon"
onclick="copiarTexto('mensajeResumen',this)">
<div class="copiado">Copiado ✅</div>
<textarea id="mensajeResumen" readonly></textarea>
</div>

<button onclick="generarResumen()">📊 Generar Resumen</button>

<script>

const SHEET_ID='2PACX-1vQK8r6I6vYuBhlxnU7pBKRkzknIwqLPFoyuF17xWeIhBihhMQ5JOfXdgy65YKn6sZQ-0BdvoS5Nj2S_';

const dias=['lunes','martes','miercoles','jueves','viernes','sabado','domingo'];

const diasBonitos=['ʟᴜɴᴇs','ᴍᴀʀᴛᴇs','ᴍɪᴇʀᴄᴏʟᴇs','ᴊᴜᴇᴠᴇs','ᴠɪᴇʀɴᴇs','sᴀʙᴀᴅᴏ','ᴅᴏᴍɪɴɢᴏ'];

let devocionalesCache=[];
let telefonoManana='';

function capitalize(str=''){
return str.charAt(0).toUpperCase()+str.slice(1);
}

function diaSeleccionado(){
return parseInt(document.getElementById('selectorDia').value);
}

window.addEventListener('load',()=>{
const hoy=new Date().getDay();
document.getElementById('selectorDia').value=hoy===0?6:hoy-1;
});

function copiarTexto(id,icon){
const texto=document.getElementById(id).value;
navigator.clipboard.writeText(texto);
const aviso=icon.parentElement.querySelector(".copiado");
aviso.style.display="block";
setTimeout(()=>{aviso.style.display="none";},2000);
}

async function cargarDevocionales(){

if(devocionalesCache.length) return devocionalesCache;

const url=`https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?gid=0&single=true&output=tsv`;

const res=await fetch(url);
const text=await res.text();

const lines=text.trim().split('\n');

devocionalesCache=lines.slice(1).map(line=>{
const cols=line.split('\t').map(c=>c.trim());

return{
devocional:cols[1]||'',
libro:cols[2]||'',
pagina:cols[3]||'',
persona:cols[4]||'',
telefono:cols[5]||'',
estado:cols[6]||'❌'
};
});

return devocionalesCache;
}

async function generarTodo(){
const rows=await cargarDevocionales();
const idx=diaSeleccionado();
generarHoyInterno(rows,idx);
generarMananaInterno(rows,idx);
generarCompletoInterno(rows,idx);
generarVersoSemanal();
}

function generarHoyInterno(rows,idx){
const e=rows[idx];
if(!e) return;

document.getElementById('mensajeHoy').value=
`👤 Hola, ${e.persona}.
📖 Hoy compartes:
📄 ${e.devocional}
📚 ${e.libro}
📋 Página: ${e.pagina}
⏰ Envíalo antes de las 12:00 pm
🎙️ Recuerda enviar tu mensaje de voz a tiempo.`;
}

function generarMananaInterno(rows,idx){

const e=rows[(idx+1)%7];
if(!e) return;

telefonoManana=e.telefono;

document.getElementById('mensajeManana').value=
`👤 ${e.persona}, recuerda que tienes un devocional mañana:
📄 Tema: ${e.devocional}
📚 Libro: ${e.libro}
📋 Página: ${e.pagina}`;
}

function enviarWhatsapp(){

if(!telefonoManana){
alert("No hay número disponible");
return;
}

const mensaje=document.getElementById('mensajeManana').value;
const texto=encodeURIComponent(mensaje);
const numero=telefonoManana.replace(/\D/g,'');

window.open(`https://wa.me/${numero}?text=${texto}`,'_blank');
}

function generarCompletoInterno(rows,idx){

const next=(idx+1)%7;
const e=rows[next];

let modo="Mensaje de voz";
if([1,3,5].includes(next)){modo="Llamada grupal";}

let msg=`*Devocional para Mañana:*
📌 ${(diasBonitos[next])}
📖 *Tema:* ${e.devocional}
📚 *Libro:* ${e.libro}
📋 Página: ${e.pagina}
🔰 Responsable: ${e.persona}
🗣️ *Modo:* ${modo}

✨ *Próximos devocionales:*
`;

for(let i=next+1;i<rows.length && i<dias.length;i++){
const d=rows[i];

msg+=`_______________________
📌 ${capitalize(dias[i])}
📄 ${d.devocional}
📚 ${d.libro}
👤 (${d.persona})
`;
}

document.getElementById('mensajeCompleto').value=msg;
}

async function generarVersoSemanal(){

try{

const res=await fetch('https://raw.githubusercontent.com/ronnieronald/Resources/main/versiculo-semanal.json');
const data=await res.json();

const v=data.versiculoSemana;
const lista=data.versiculosMemorizados;

const listaTexto=lista.map(item=>`📄 ${item.libro} ${item.capitulo}:${item.versiculo}`).join('\n');

const msg=
`📖 *Versículo de la semana* 📚
╰➤ ${v.libro} ${v.capitulo}:${v.versiculo} (RVR1960)

“${v.texto}”

📚 *Versículos hasta ahora* 📖
${listaTexto}`;

document.getElementById('mensajeVersoSemanal').value=msg;

}catch(e){
alert('Error al cargar el versículo semanal.');
}

}

function construirResumenSemanal(rows){

const diasSemana=['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];

let mensaje=`📖 *Informe Semanal de*
╰➤ *Devocionales*

`;

rows.forEach((r,index)=>{
mensaje+=`──────────────
🗓️ ${diasSemana[index]}
👤 ${r.persona}
📄 ${r.devocional}
📚 ${r.libro} → ${r.estado}

`;
});

mensaje+=`__________________________

*Guía:*
✅ Enviado a tiempo
⏰ Enviado tarde
⚠️ Justificado
❌ No enviado

*¡Gracias por su compromiso esta semana!*`;

return mensaje;
}

async function generarResumen(){

const rows=await cargarDevocionales();
const resumen=construirResumenSemanal(rows);

document.getElementById('mensajeResumen').value=resumen;

}

</script>

</body>
</html>
