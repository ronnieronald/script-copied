<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Generador de Devocionales</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { font-family: Arial, sans-serif; padding: 20px; background: #f0f4ff; color: #333; }
  h1 { text-align:center; color:#1e3a8a; margin-bottom:20px; }
  label { font-weight:bold; }
  select, button, textarea { width: 100%; margin-bottom:15px; padding:10px; font-size:1rem; border-radius:8px; border:1px solid #ccc; }
  button { cursor:pointer; background:#1e3a8a; color:#fff; transition:0.3s; }
  button:hover { background:#3b82f6; }
  textarea { min-height:150px; resize: vertical; font-family: monospace; }
  h3 { margin-top:30px; color:#1e40af; }
</style>
</head>
<body>

<h1>Generador de Devocionales y Versículos</h1>

<label for="selectorDia">Selecciona el día:</label>
<select id="selectorDia">
  <option value="0">Lunes</option>
  <option value="1">Martes</option>
  <option value="2">Miércoles</option>
  <option value="3">Jueves</option>
  <option value="4">Viernes</option>
  <option value="5">Sábado</option>
  <option value="6">Domingo</option>
</select>

<!-- 1️⃣ Devocional de Hoy -->
<h3>1️⃣ Devocional de Hoy</h3>
<button onclick="generarHoy()">Generar</button>
<button onclick="copiarTexto('mensajeHoy')">Copiar</button>
<textarea id="mensajeHoy" readonly></textarea>

<!-- 2️⃣ Prerecordatorio de Mañana -->
<h3>2️⃣ Prerecordatorio de Mañana</h3>
<button onclick="generarManana()">Generar</button>
<button onclick="copiarTexto('mensajeManana')">Copiar</button>
<textarea id="mensajeManana" readonly></textarea>

<!-- 3️⃣ Devocional Completo (Formato Caja) -->
<h3>3️⃣ Devocional Completo</h3>
<button onclick="generarCompleto()">Generar</button>
<button onclick="copiarTexto('mensajeCompleto')">Copiar</button>
<textarea id="mensajeCompleto" readonly></textarea>

<!-- 4️⃣ Versículo Diario -->
<h3>4️⃣ Versículo Diario</h3>
<button onclick="mostrarVersoDiario()">Generar</button>
<button onclick="copiarTexto('mensajeVersoDiario')">Copiar</button>
<textarea id="mensajeVersoDiario" readonly></textarea>
<div id="dailyVersesWrapper" style="display:none;"></div>
<script async defer src="https://dailyverses.net/get/random.js?language=nvi"></script>

<!-- 5️⃣ Versículo Semanal -->
<h3>5️⃣ Versículo Semanal</h3>
<button onclick="generarVersoSemanal()">Generar</button>
<button onclick="copiarTexto('mensajeVersoSemanal')">Copiar</button>
<textarea id="mensajeVersoSemanal" readonly></textarea>

<script>
const SHEET_ID = '2PACX-1vQK8r6I6vYuBhlxnU7pBKRkzknIwqLPFoyuF17xWeIhBihhMQ5JOfXdgy65YKn6sZQ-0BdvoS5Nj2S_';
const dias = ['lunes','martes','miercoles','jueves','viernes','sabado','domingo'];
let devocionalesCache = [];

// ======================= Utilidades =======================
function capitalize(str=''){ return str.charAt(0).toUpperCase() + str.slice(1); }
function centrarTexto(texto, ancho=17){
  const limpio = texto.trim();
  if(limpio.length >= ancho) return limpio;
  const totalEsp = ancho - limpio.length;
  const izq = Math.floor(totalEsp/2), der = totalEsp - izq;
  return ' '.repeat(izq) + limpio + ' '.repeat(der);
}
function diaSeleccionado(){
  const sel = document.getElementById('selectorDia');
  return parseInt(sel.value,10);
}

// Auto seleccionar día actual
window.addEventListener('load',()=>{
  const hoy = new Date().getDay(); // 0=domingo
  document.getElementById('selectorDia').value = hoy===0?6:hoy-1;
});

// Copiar al portapapeles
function copiarTexto(id){
  const txt = document.getElementById(id);
  txt.select();
  txt.setSelectionRange(0, 99999);
  document.execCommand('copy');
  alert('Texto copiado!');
}

// ======================= Google Sheets =======================
async function cargarDevocionales(){
  if(devocionalesCache.length) return devocionalesCache;
  try{
    const url = `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?gid=0&single=true&output=tsv`;
    const res = await fetch(url);
    if(!res.ok) throw new Error('No se pudo cargar la hoja');
    const text = await res.text();
    const lines = text.trim().split('\n');
    devocionalesCache = lines.slice(1).map(line=>{
      const cols = line.split('\t').map(c=>c.trim());
      return {
        devocional: cols[1]||'Sin devocional',
        libro: cols[2]||'',
        pagina: cols[3]||'',
        persona: cols[4]||'Desconocido',
        telefono: cols[5]||null
      }
    });
    return devocionalesCache;
  } catch(e){
    console.error(e);
    alert('Error al cargar devocionales.');
    return [];
  }
}

// ======================= Mensajes =======================
async function generarHoy(){
  const rows = await cargarDevocionales();
  const idx = diaSeleccionado();
  const e = rows[idx];
  if(!e) return;
  document.getElementById('mensajeHoy').value =
    `👤 Hola, ${e.persona}.\n📖 Hoy compartes:\n📄 ${e.devocional}\n📚 ${e.libro}\n📋 Página: ${e.pagina}\n⏰ Envíalo antes de las 12:00 pm\n🎙️ Recuerda enviar tu mensaje de voz a tiempo.`;
}

async function generarManana(){
  const rows = await cargarDevocionales();
  const idx = (diaSeleccionado()+1)%7;
  const e = rows[idx];
  if(!e) return;
  document.getElementById('mensajeManana').value =
    `👤 ${e.persona}, recuerda que tienes un devocional mañana:\n📄 Tema: ${e.devocional}\n📚 Libro: ${e.libro}\n📋 Página: ${e.pagina}\n📌 Este mensaje volverá a aparecer como recordatorio.`;
}

async function generarCompleto(){
  const rows = await cargarDevocionales();
  const idx = (diaSeleccionado()+1)%7;
  const e = rows[idx];
  if(!e) return;

  let msg = `*Devocional para Mañana:*\n╔══════╗\n${centrarTexto(capitalize(dias[idx]))}\n╚══════╝\n📖 *Tema:* ${e.devocional}\n📚 *Libro:* ${e.libro}\n📋 Página: ${e.pagina}\n🔰 Responsable: ${e.persona}\n🗣️ *Modo:* Mensaje de voz\n\n✨ *Próximos devocionales:*\n`;
  for(let i=idx+1;i<rows.length && i<dias.length;i++){
    const d=rows[i];
    msg+=`_______________________\n📌 ${capitalize(dias[i])}\n📄 ${d.devocional}\n📚 ${d.libro}\n👤 (${d.persona})\n`;
  }
  document.getElementById('mensajeCompleto').value = msg;
}

// ======================= Versículo Diario =======================
function mostrarVersoDiario() {
  const wrapper = document.getElementById('dailyVersesWrapper');
  const texto = wrapper.querySelector('.dailyVerses.bibleText')?.textContent?.trim();
  const cita = wrapper.querySelector('.dailyVerses.bibleVerse')?.textContent?.trim();

  if(texto && cita){
    document.getElementById('mensajeVersoDiario').value = `📖 Versículo de Hoy 📚\n${texto}\n— ${cita}`;
  } else {
    document.getElementById('mensajeVersoDiario').value = 'No se pudo obtener el versículo de hoy.';
  }
}

// ======================= Versículo Semanal =======================
async function generarVersoSemanal(){
  try{
    const res = await fetch('https://raw.githubusercontent.com/ronnieronald/Resources/main/versiculo-semanal.json');
    if(!res.ok) throw new Error('No se pudo cargar el versículo semanal');
    const data = await res.json();
    const v = data.versiculoSemana;
    const lista = data.versiculosMemorizados;
    if(!v || !Array.isArray(lista)) return;

    const hoy = new Date().getDay();
    const recordatorio = hoy===6 ? '📌 Aún hay tiempo…' : hoy===0 ? '📌 Recuerda aprenderlo para hoy.' : '📌 Recuerda durante la semana.';

    const listaTexto = lista.map(item=>`📄 ${item.libro} ${item.capitulo}:${item.versiculo}`).join('\n');
    const msg = `📖 *Versículo de la semana* 📚\n╰➤${v.libro} ${v.capitulo}:${v.versiculo}\n“${v.texto}”\n📚 *Versículos hasta ahora* 📖\n${listaTexto}\n${recordatorio}`;
    document.getElementById('mensajeVersoSemanal').value = msg;
  }catch(e){ console.error(e); alert('Error al cargar el versículo semanal.'); }
}
</script>

</body>
</html>
