<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Generador de Devocional</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  /* Reset básico */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, #f0f4ff, #e0e7ff);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    color: #333;
  }

  h1 {
    font-size: 2rem;
    margin-bottom: 20px;
    text-align: center;
    color: #1e3a8a;
  }

  .container {
    width: 100%;
    max-width: 700px;
    background: #fff;
    border-radius: 15px;
    padding: 25px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
  }

  label {
    display: block;
    margin-bottom: 8px;
    font-weight: bold;
  }

  select {
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 1rem;
    margin-bottom: 15px;
  }

  button {
    background: #1e3a8a;
    color: #fff;
    border: none;
    padding: 12px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1rem;
    margin-right: 10px;
    transition: background 0.3s;
  }

  button:hover {
    background: #3b82f6;
  }

  textarea {
    width: 100%;
    min-height: 300px;
    margin-top: 15px;
    padding: 15px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-family: monospace;
    font-size: 1rem;
    resize: vertical;
  }

  @media (max-width: 500px) {
    h1 { font-size: 1.5rem; }
    button { width: 100%; margin-bottom: 10px; }
    textarea { min-height: 250px; }
  }
</style>
</head>
<body>
<h1>Generador de Devocional</h1>

<div class="container">
  <label for="dia">Selecciona el día:</label>
  <select id="dia">
    <option value="0">Lunes</option>
    <option value="1">Martes</option>
    <option value="2">Miércoles</option>
    <option value="3">Jueves</option>
    <option value="4">Viernes</option>
    <option value="5">Sábado</option>
    <option value="6">Domingo</option>
  </select>

  <div style="margin-bottom:15px;">
    <button onclick="generarMensaje()">Generar mensaje</button>
    <button onclick="copiarMensaje()">Copiar al portapapeles</button>
  </div>

  <textarea id="mensaje" readonly></textarea>
</div>

<script>
const SHEET_ID = '2PACX-1vQK8r6I6vYuBhlxnU7pBKRkzknIwqLPFoyuF17xWeIhBihhMQ5JOfXdgy65YKn6sZQ-0BdvoS5Nj2S_';
const dias = ['lunes','martes','miercoles','jueves','viernes','sabado','domingo'];

async function getDevocionales() {
  const url = `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?gid=0&single=true&output=tsv`;
  const res = await fetch(url);
  const text = await res.text();
  const lines = text.trim().split('\n');
  return lines.slice(1).map(line => {
    const cols = line.split('\t').map(c => c.trim());
    return {
      devocional: cols[1] || 'Sin devocional',
      libro: cols[2] || '',
      pagina: cols[3] || '',
      persona: cols[4] || 'Desconocido',
      telefono: cols[5] || ''
    };
  });
}

function centrarTexto(texto, ancho = 17) {
  const limpio = texto.trim();
  if (limpio.length >= ancho) return limpio;
  const totalEspacios = ancho - limpio.length;
  const izquierda = Math.floor(totalEspacios / 2);
  const derecha = totalEspacios - izquierda;
  return ' '.repeat(izquierda) + limpio + ' '.repeat(derecha);
}

function capitalize(str='') {
  return str.charAt(0).toUpperCase() + str.slice(1);
}

function construirMensaje(rows, indexManana) {
  const entrada = rows[indexManana];
  if (!entrada) return '⚠️ No hay devocional para este día.';

  let modo = 'Mensaje de voz';
  if ([1,3,5].includes(indexManana)) modo = 'Llamada Grupal';

  const diaCentrado = centrarTexto(capitalize(dias[indexManana]), 17);

  let mensaje = `*Devocional para Mañana:*\n` +
                '╔══════╗\n' +
                `${diaCentrado}\n` +
                '╚══════╝\n' +
                `📖 *Tema:* ${entrada.devocional}\n` +
                `📚 *Libro:* ${entrada.libro}\n` +
                `📋 *Pagina:* ${entrada.pagina}\n` +
                `🔰 Responsable: ${entrada.persona}\n` +
                `🗣️ *Modo:* ${modo}\n\n✨ *Próximos devocionales:*\n`;

  for (let i = indexManana+1; i < rows.length && i < dias.length; i++) {
    const d = rows[i];
    mensaje += `_______________________\n` +
               `📌 ${capitalize(dias[i])}\n` +
               `📄 ${d.devocional}\n` +
               `📚 ${d.libro}\n` +
               `👤 (${d.persona})\n`;
  }

  mensaje += '_______________________';
  return mensaje;
}

async function generarMensaje() {
  const index = parseInt(document.getElementById('dia').value, 10);
  const rows = await getDevocionales();
  const msg = construirMensaje(rows, index);
  document.getElementById('mensaje').value = msg;
}

function copiarMensaje() {
  const textarea = document.getElementById('mensaje');
  textarea.select();
  navigator.clipboard.writeText(textarea.value).then(() => {
    alert('Mensaje copiado al portapapeles!');
  });
}

// ============================
// Selección automática del devocional de mañana
// ============================
window.addEventListener('DOMContentLoaded', () => {
  let hoy = new Date().getDay(); // 0=domingo, 1=lunes...
  let hoyIndex = hoy === 0 ? 6 : hoy - 1; // mapear a lunes=0 ... domingo=6
  let mananaIndex = (hoyIndex + 1) % 7; // siguiente día
  document.getElementById('dia').value = mananaIndex;
  generarMensaje();
});
</script>
</body>
</html>
